---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: "${MY_APP}-db"
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "30m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  inputs:
    - is_initdb: ${POSTGRES_IS_INITDB=false}
      existingSecretName: "${POSTGRES_EXISTING_SECRETNAME}"
  resources:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: "${MY_APP}-db"
        namespace: << inputs.provider.namespace >>
        annotations:
          cnpg.io/skipEmptyWalArchiveCheck: enabled # Allow for backup source and target to be the same
      spec:
        instances: 3 # 1 Primary + 2 Replicas for High Availability

        nodeMaintenanceWindow:
          inProgress: false
          reusePVC: true
        
        switchoverDelay: 60 # 1 minute is plenty for "hiccup" protection

        # 'unsupervised' is correct. It means "Operator, take care of it."
        primaryUpdateStrategy: unsupervised
        
        # This ensures we always have a synchronous stand-by 
        # for zero data loss during the automatic failover.
        minSyncReplicas: 1
        maxSyncReplicas: 2

        affinity:
          # "required" ensures pods NEVER share a node
          podAntiAffinityType: required
          # Use "kubernetes.io/hostname" to target individual worker nodes
          topologyKey: kubernetes.io/hostname

        imageName: ghcr.io/cloudnative-pg/postgresql:17.1

        # 1. Continuous Backup to Synology (MinIO)
        plugins:
          - name: barman-cloud.cloudnative-pg.io
            isWALArchiver: true
            parameters:
              barmanObjectName: cluster-nas-backup

        # 2. Resource Management (Guaranteed QoS)
        # Keeping requests and limits identical prevents OOM kills
        resources:
          requests:
            memory: "192Mi"
            cpu: "20m"
          limits:
            memory: "1Gi"
            cpu: "1"

        # 3. Storage Configuration
        storage:
          #storageClass: &storageClass longhorn-postgres-replica-storage
          storageClass: &storageClass openebs-hostpath
          size: ${POSTGRES_STORAGE_SIZE}
        walStorage:
          # Separate WAL storage is recommended for production to avoid IO contention
          storageClass: *storageClass
          size: ${POSTGRES_WALSTORAGE_SIZE}

        externalClusters:
          - name: source
            plugin:
              name: barman-cloud.cloudnative-pg.io
              parameters:
                barmanObjectName: cluster-nas-backup
                serverName: "${MY_APP}-db"

        backup:
          target: prefer-standby # instead of primary
        
  resourcesTemplate: |
      ---
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: "${MY_APP}-db"
        namespace: << inputs.provider.namespace >>
      spec:
        # 4. Database Initialization
        bootstrap:
          <<- if inputs.is_initdb >>
          initdb:
            database: app
            <<- if (empty inputs.existingSecretName) >>
            secret:
              name: << inputs.existingSecretName >>
            <<- end >>
          <<- else >>
          recovery:
            source: source
            database: app
            <<- if (empty inputs.existingSecretName) >>
            secret:
              name: << inputs.existingSecretName >>
            <<- end >>
          <<- end >>
