apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.8.8"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - source-watcher
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    multitenant: false
    networkPolicy: true
    domain: "cluster.local"
    # kubeAPI:
    #   qps: 500
    #   burst: 1000
  sync:
    kind: GitRepository
    url: "https://github.com/angelnu/k8s-gitops.git"
    ref: "refs/heads/main"
    path: "clusters/test/config"
    #pullSecret: "flux-system"
  
  # Customizes the underlying deployments to match your tuning adjustments
  kustomizeController:
    resources:
      limits:
        memory: 2Gi
    # Preserves your concurrent workers and temporary memory-disk adjustments
    args:
      - --concurrent=12
      - --requeue-dependency=5s
    volumes:
      - name: temp
        emptyDir:
          medium: Memory

  helmController:
    resources:
      limits:
        memory: 2Gi
    # Preserves your worker count and feature gates 
    args:
      - --concurrent=12
      - --requeue-dependency=5s
      - --feature-gates=ExternalArtifact=true,OOMWatch=true
      - --oom-watch-memory-threshold=95
      - --oom-watch-interval=500ms

  sourceController:
    resources:
      limits:
        memory: 2Gi
    args:
      - --feature-gates=ExternalArtifact=true