apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.8.8"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    multitenant: false
    networkPolicy: true
    domain: "cluster.local"
    # kubeAPI:
    #   qps: 500
    #   burst: 1000
  sync:
    name: cluster-repository
    kind: GitRepository
    url: "https://github.com/angelnu/k8s-gitops.git"
    ref: "refs/heads/main"
    path: "clusters/test/config"
    #pullSecret: "flux-system"
  
  kustomize:
    patches:
      # 1. Update tuning arguments for all 3 primary controllers
      - target:
          kind: Deployment
          name: (kustomize-controller|helm-controller|source-controller)
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --concurrent=12
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --requeue-dependency=5s
          - op: replace
            path: /spec/template/spec/containers/0/resources/limits/memory
            value: 2Gi

      # 2. Add specific cross-namespace and OOMWatch gates to the Helm Controller
      - target:
          kind: Deployment
          name: helm-controller
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --no-cross-namespace-refs=false
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --feature-gates=ExternalArtifact=true,OOMWatch=true
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --oom-watch-memory-threshold=95
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --oom-watch-interval=500ms

      # 3. Enable In-Memory Kustomize Builds
      - target:
          kind: Deployment
          name: kustomize-controller
        patch: |
          - op: replace
            path: /spec/template/spec/volumes/0
            value:
              name: temp
              emptyDir:
                medium: Memory
  