---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${MY_NAMESPACE}
spec:
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 60m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 30m
  timeout: 20m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # See https://github.com/bjw-s/helm-charts/blob/main/charts/library/common/values.yaml
  values:
    controllers:
      main:
        serviceAccount:
          identifier: default
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [
                {
                  "name": "localnet",
                  "interface": "localnet",
                  "ips": [
                    "${CLUSTER_EXTERNAL_SUBNET_PREFIX}.${CLUSTER_LOCALNET_ESPHOME}/${CLUSTER_LOCALNET_PREFIX_LENGTH}"
                    ]
                }
              ]
        containers:
          main:
            image:
              repository: ghcr.io/esphome/esphome
              tag: 2026.6.4@sha256:20c12b47f53d31c4d2b1eeeec03ef93e414a710f5834220d02353ec575bca1c6
            #env:
            #  ESPHOME_DASHBOARD_USE_PING: "true"
          editor:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.127.0@sha256:4193b3a0c2661bce87b3cafede59e7d50e1e99e35f7c10bece7c2a7e0660c0a8
            args:
              - --auth
              - none
              - --port
              - "12321"
              - /config
            securityContext:
              runAsUser: 0
    serviceAccount:
      default:
        enabled: true
    rbac:
      bindings:
        default:
          type: RoleBinding
          roleRef:
            name: system:openshift:scc:anyuid  # For runAsUser
            kind: ClusterRole
          subjects:
            - identifier: default

    persistence:
      config:
        enabled: true
        existingClaim: esphome-pvc
      build:
        enabled: true
        type: emptyDir
        # type: persistentVolumeClaim
        # accessMode: ReadWriteOnce
        # size: 10Gi
        globalMounts:
          - path: /config/.esphome
            readOnly: false
      # cache:
      #   enabled: true
      #   type: emptyDir
      #   globalMounts:
      #     - path: /config/.esphome/cache
      #       readOnly: false
      ssh-key:
        enabled: true
        type: secret
        name: git-ssh-keys
        defaultMode: 256
        items:
          - key: id_rsa
            path: id_rsa
        advancedMounts:
          main:
            editor:
              - path: /root/.ssh/id_rsa
                subPath: id_rsa

    service:
      main:
        controller: main
        ports:
          http:
            port: 6052
      editor:
        controller: main
        ports:
          http:
            port: 12321

    ingress:
      main:
        enabled: true
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/icon: simple-icons:esphome
          hajimari.io/info: Programs esphome devices
          hajimari.io/group: automation
          nginx.ingress.kubernetes.io/configuration-snippet: |
            auth_request_set $required_groups 'casa_editors';
        hosts:
          - host: esphome.pub.${CLUSTER_DOMAIN}
            paths: &paths
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
          - host: esphome.home.${CLUSTER_DOMAIN}
            paths: *paths
      editor:
        enabled: true
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/icon: vscode-icons:file-type-vscode
          hajimari.io/info: Esphome editor
          hajimari.io/group: automation
          nginx.ingress.kubernetes.io/configuration-snippet: |
            auth_request_set $required_groups 'casa_editors';
        hosts:
          - host: esphome-editor.home.${CLUSTER_DOMAIN}
            paths: &paths_editor
              - path: /
                pathType: Prefix
                service:
                  identifier: editor
                  port: http
          - host: esphome-editor.pub.${CLUSTER_DOMAIN}
            paths: *paths_editor
