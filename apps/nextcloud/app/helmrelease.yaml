apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  chart:
    spec:
      chart: nextcloud
      version: 9.2.0
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
      interval: 60m
  interval: 30m
  timeout: 20m
  install:
    remediation:
      retries: -1
  # Add this to force Flux to check the secret's version
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # See https://github.com/nextcloud/helm/blob/master/charts/nextcloud/values.yaml
  values:
    # image:
    #   repository: docker.io/library/nextcloud
    #   tag: 29.0.3@sha256:2ab0c5de2afd33c55721e69e87bd1667cad6c4550ba0fd0303cfeb7abb260750
    
    phpClientHttpsFix:
      enabled: true

    ingress:
      enabled: true
      annotations:
        hajimari.io/enable: "true"
        hajimari.io/icon: simple-icons:nextcloud
        hajimari.io/info: File and Calendar server
        hajimari.io/group: tools
        nginx.ingress.kubernetes.io/enable-global-auth: "false"

        nginx.ingress.kubernetes.io/proxy-body-size: 4G
        nginx.ingress.kubernetes.io/server-snippet: |-
          server_tokens off;
          proxy_hide_header X-Powered-By;
          rewrite ^/.well-known/webfinger /index.php/.well-known/webfinger last;
          rewrite ^/.well-known/nodeinfo /index.php/.well-known/nodeinfo last;
          rewrite ^/.well-known/host-meta /public.php?service=host-meta last;
          rewrite ^/.well-known/host-meta.json /public.php?service=host-meta-json;
          location = /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
          }
          location = /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
          }
          location = /robots.txt {
            allow all;
            log_not_found off;
            access_log off;
          }
          location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)/ {
            deny all;
          }
          location ~ ^/(?:autotest|occ|issue|indie|db_|console) {
            deny all;
          }
      tls:
      - hosts:
        - nextcloud.${CLUSTER_SHORT_DOMAIN}
    #username: admin
    #password: password
    redis:
      enabled: true
      # password: set in secret
      master:
        persistence:
          enabled: false
      replica:
        persistence:
          enabled: false
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      existingSecret:
        enabled: true
        secretName: nextcloud-db-app
        usernameKey: user
        passwordKey: password
        hostKey: host
        databaseKey: dbname
    cronjob:
      enabled: true
      failedJobsHistoryLimit: 1
      successfulJobsHistoryLimit: 1
      sidecar:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 256Mi

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    nextcloud:
      host: nextcloud.${CLUSTER_SHORT_DOMAIN}
      trustedDomains:
        - nextcloud.${CLUSTER_SHORT_DOMAIN}
        - nextcloud.pub.${CLUSTER_DOMAIN}
        - nextcloud.home.${CLUSTER_DOMAIN}
      extraEnv:
        - name: TRUSTED_PROXIES
          value: '${NETWORK_K8S_CLUSTER_CIDR}'
        - name: FORWARDED_FOR_HEADERS
          value: "HTTP_X_FORWARDED_FOR"
        - name: OVERWRITEHOST
          value: "nextcloud.${CLUSTER_SHORT_DOMAIN}"
        - name: OVERWRITECLIURL
          value: "https://nextcloud.${CLUSTER_SHORT_DOMAIN}"
      extraVolumes:
      - name: nfs-video
        nfs:
          server: "${NFS_SERVER}"
          path: "${NFS_VIDEO}"
      - name: nfs-software
        nfs:
          server: "${NFS_SERVER}"
          path: "${NFS_SOFTWARE}"
      - name: nfs-music
        nfs:
          server: "${NFS_SERVER}"
          path: "${NFS_MUSIC}"
      - name: nfs-downloads
        nfs:
          server: "${NFS_SERVER}"
          path: "${NFS_DOWNLOADS}"
      - name: esphome
        persistentVolumeClaim:
          claimName: esphome-pvc
      extraVolumeMounts:
      - name: nfs-video
        mountPath: "/video"
      - name: nfs-software
        mountPath: "/software"
      # - name: esphome
      #   subPath: devices
      #   mountPath: "/software/3D-printer/projects/Electronica/esphome_devices"
      - name: nfs-music
        mountPath: "/music"
      - name: nfs-downloads
        mountPath: "/downloads"
      phpConfigs:
        uploadLimit.ini: |
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
          default_phone_region = DE
      configs:
        gitops.config.php: |-
          <?php
          $CONFIG = array (
            'appstoreenabled' => true,
            #'appstoreurl' => 'https://apps.nextcloud.com/api/v0',
            'mail_domain' => '${CLUSTER_DOMAIN}',
          );
        #Circumvention for client freezes - https://github.com/nextcloud/desktop/issues/5094
        bulkupload.config.php: |-
          <?php
          $CONFIG = array (
            'bulkupload.enabled' => false,
          );
      mail:
        enabled: true
        fromAddress: nextcloud
        domain: ${CLUSTER_DOMAIN}
        smtp:
          host: ${CLUSTER_MAIL_SERVER}
          secure:
          port: ${CLUSTER_MAIL_SERVER_PORT}
          authtype:
          name:
          password:
    livenessProbe:
      enabled: false
    readinessProbe:
      enabled: false
    
    lifecycle:
      postStartCommand:
      - su
      - www-data
      - -s
      - /bin/sh
      - -c
      - >-
        cd /var/www/html;
        ./occ upgrade;
        ./occ db:add-missing-indices;
        /bin/true

    persistence:
      enabled: true
      existingClaim: nfs-nextcloud
    
    rbac:
      enabled: true
      serviceaccount:
        create: true
        name: nextcloud

  valuesFrom:
    - kind: Secret
      name: "nextcloud-helm-values"
      valuesKey: nextcloud.yaml
      optional: false
