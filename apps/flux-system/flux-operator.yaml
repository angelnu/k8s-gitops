apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flux-operator-charts
  namespace: flux-system
spec:
  interval: 2h
  type: oci
  url: oci://ghcr.io/controlplaneio-fluxcd/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: flux-operator
      version: "0.50.0" # Match the current stable version targeting Flux v2.8.x
      sourceRef:
        kind: HelmRepository
        name: flux-operator-charts
        namespace: flux-system
  values:
    # Pass the ServiceAccount token into the container environment dynamically
    extraEnvs:
      - name: OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            # OpenShift auto-generates a token secret matching your ServiceAccount name
            name: flux-operator-token        
    # Overwrite the container's default trust pool directory with the OKD Service CA
    volumeMounts:
      - name: trusted-service-ca
        mountPath: /etc/ssl/certs
        readOnly: true
    
    volumes:
      - name: trusted-service-ca
        configMap:
          name: openshift-service-ca.crt
          items:
            - key: service-ca.crt
              path: ca-certificates.crt
    web:
      config:
        baseURL: https://flux.pub.${CLUSTER_DOMAIN}
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            issuerURL: https://oauth-openshift.openshift-authentication.svc
            
            clientID: flux-operator
            
            # Bypasses the hardcoded validation check using the runtime env token
            clientSecret: $${OAUTH_CLIENT_SECRET}
            
            scopes:
            - openid
            - user:info
            - user:groups
      # config:
      #   baseURL: https://flux.pub.${CLUSTER_DOMAIN}
      #   authentication:
      #     type: OAuth2
      #     oauth2:
      #       provider: OIDC
      #       issuerURL: https://authentik.pub.${CLUSTER_DOMAIN}/application/o/flux-app/
      #       # clientID: set in secret
      #       # clientSecret: set in secret
      #       scopes:
      #       - openid
      #       - profile
      #       - email
      #       - groups
      #       - offline_access
      ingress:
        enabled: true
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/icon: simple-icons:flux
          hajimari.io/info: Flux Operator
          hajimari.io/group: cluster
          nginx.ingress.kubernetes.io/enable-global-auth: "false"
        hosts:
          - host: flux.pub.${CLUSTER_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
  valuesFrom:
  - kind: Secret
    name: flux-operator-values
    valuesKey: values.yaml
    optional: false