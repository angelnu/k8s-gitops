apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flux-operator-charts
  namespace: flux-system
spec:
  interval: 2h
  type: oci
  url: oci://ghcr.io/controlplaneio-fluxcd/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: flux-operator
      version: "0.50.0" # Match the current stable version targeting Flux v2.8.x
      sourceRef:
        kind: HelmRepository
        name: flux-operator-charts
  values:
    web:
      config:
        baseURL: https://flux.pub.${CLUSTER_DOMAIN}
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            issuerURL: https://authentik.pub.${CLUSTER_DOMAIN}/application/o/flux/
            # clientID: set in secret
            # clientSecret: set in secret
      ingress:
        enabled: true
        hosts:
          - host: flux.pub.${CLUSTER_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
  valuesFrom:
  - kind: Secret
    name: flux-operator-values
    valuesKey: values.yaml
    optional: false