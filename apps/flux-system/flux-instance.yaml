apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  # Sets the core version tag of the underlying controllers
  version: "v2.8.7"
  
  # Preserves your scale performance adjustments 
  cluster:
    kubeAPI:
      qps: 500
      burst: 1000

  # Customizes the underlying deployments to match your tuning adjustments
  kustomizeController:
    resources:
      limits:
        memory: 2Gi
    # Preserves your concurrent workers and temporary memory-disk adjustments
    args:
      - --concurrent=12
      - --requeue-dependency=5s
    volumes:
      - name: temp
        emptyDir:
          medium: Memory

  helmController:
    resources:
      limits:
        memory: 2Gi
    # Preserves your worker count and feature gates 
    args:
      - --concurrent=12
      - --requeue-dependency=5s
      - --feature-gates=ExternalArtifact=true,OOMWatch=true
      - --oom-watch-memory-threshold=95
      - --oom-watch-interval=500ms

  sourceController:
    resources:
      limits:
        memory: 2Gi
    args:
      - --feature-gates=ExternalArtifact=true