apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-okd-finalizer-fix
rules:
  - apiGroups: ["acme.cert-manager.io", "cert-manager.io"]
    resources: ["*/finalizers"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-okd-finalizer-fix-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-okd-finalizer-fix
subjects:
  - kind: ServiceAccount
    name: cert-manager # Verify this matches your SA name
    namespace: cert-manager